<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Propiedad</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    width:100%;
    height:100%;
  }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #1a1a1a;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    padding: 3% 3%;
  }

  .card {
    width:100%;
    max-width:100%;
  }

  .header {
    color:#F5EFE0;
    text-align:center;
    margin-bottom:3%;
  }
  .header h1 {
    font-size: clamp(14px, 3vw, 22px);
    color:#F5EFE0;
    margin-bottom:4px;
  }
  .header .badge {
    display:inline-block;
    background:#C9A227;
    color:#1a1a1a;
    font-weight:bold;
    font-size: clamp(9px, 1.5vw, 12px);
    padding:3px 12px;
    border-radius:20px;
    letter-spacing:0.5px;
    text-transform:uppercase;
  }

  .datos {
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 2%;
    margin-bottom: 3%;
  }
  @media (min-width:500px){
    .datos { grid-template-columns: repeat(4, 1fr); }
  }
  .dato {
    background:#242424;
    border:1px solid #C9A227;
    border-radius:10px;
    padding: 3% 2%;
    text-align:center;
  }
  .dato .valor {
    color:#F5EFE0;
    font-size: clamp(11px, 2.2vw, 17px);
    font-weight:bold;
  }
  .dato .etiqueta {
    color:#C9A227;
    font-size: clamp(8px, 1.3vw, 11px);
    text-transform:uppercase;
    letter-spacing:0.5px;
    margin-top:2px;
  }

  /* SLIDER 100% FLUIDO - se adapta a cualquier tamaño del bloque en Notion */
  .slider {
    position:relative;
    width:100%;
    aspect-ratio: 4/3;   /* mantiene la proporción sin importar el ancho */
    overflow:hidden;
    border-radius: clamp(6px, 1.5vw, 12px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    border: 2px solid #C9A227;
  }
  .slide {
    position:absolute;
    top:0; left:0;
    width:100%;
    height:100%;
    object-fit:cover;   /* la foto siempre llena el marco sin deformarse */
    opacity:0;
    transition: opacity 0.7s ease-in-out;
  }
  .slide.active { opacity:1; z-index:1; }

  .arrow {
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background: rgba(0,0,0,0.55);
    color:#C9A227;
    border:none;
    font-size: clamp(14px, 2.5vw, 26px);
    width: clamp(28px, 6vw, 44px);
    height: clamp(28px, 6vw, 44px);
    border-radius:50%;
    cursor:pointer;
    z-index:2;
    display:flex;
    align-items:center;
    justify-content:center;
    transition: background 0.2s;
  }
  .arrow:hover { background: rgba(0,0,0,0.8); }
  .prev { left: 3%; }
  .next { right: 3%; }

  .counter {
    position:absolute;
    bottom: 3%;
    left:50%;
    transform:translateX(-50%);
    background: rgba(0,0,0,0.55);
    color:#F5EFE0;
    padding: 2% 3%;
    border-radius:20px;
    font-size: clamp(9px, 1.6vw, 13px);
    z-index:2;
    letter-spacing:0.5px;
    white-space:nowrap;
  }
  .dots {
    position:absolute;
    bottom: 3%;
    right: 3%;
    display:flex;
    gap: clamp(4px, 1vw, 6px);
    z-index:2;
  }
  .dot {
    width: clamp(6px, 1.2vw, 8px);
    height: clamp(6px, 1.2vw, 8px);
    border-radius:50%;
    background: rgba(245,239,224,0.5);
    cursor:pointer;
    transition: background 0.2s, transform 0.2s;
  }
  .dot.active { background: #C9A227; transform: scale(1.3); }

  .contacto {
    margin-top: 3%;
    text-align:center;
  }
  .btn-whatsapp {
    display:inline-block;
    background:#C9A227;
    color:#1a1a1a;
    font-weight:bold;
    text-decoration:none;
    padding: 2.5% 6%;
    border-radius:30px;
    font-size: clamp(11px, 2vw, 15px);
    letter-spacing:0.3px;
  }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <span class="badge">VENTA</span>
    <h1>Departamento en Venta - Av. Tadeo Haenke</h1>
  </div>

  <div class="datos">
    <div class="dato">
      <div class="valor">960.000 Bs</div>
      <div class="etiqueta">Precio</div>
    </div>
    <div class="dato">
      <div class="valor">149.19 m2</div>
      <div class="etiqueta">Superficie</div>
    </div>
    <div class="dato">
      <div class="valor">3 Hab</div>
      <div class="etiqueta">Dormitorios</div>
    </div>
    <div class="dato">
      <div class="valor">Condominio Las torres</div>
      <div class="etiqueta">Ubicaci&oacute;n</div>
    </div>
  </div>

  <div class="slider" id="slider">
    <!--
      Agrega o quita bloques <img class="slide"> segun cuantas fotos tengas.
      La ruta "fotos/foto1.jpg" es relativa: la foto debe estar
      dentro de la carpeta "fotos" que esta junto a este index.html.
      El primero debe tener la clase "slide active".
    -->
    <img class="slide active" src="fotos/foto1.png">
    <img class="slide" src="fotos/foto2.png">
    <img class="slide" src="fotos/foto3.png">
    <img class="slide" src="fotos/foto4.png">
    <img class="slide" src="fotos/foto5.png">

    <button class="arrow prev" onclick="changeSlide(-1)">&#10094;</button>
    <button class="arrow next" onclick="changeSlide(1)">&#10095;</button>

    <div class="counter" id="counter">1 / 4</div>
    <div class="dots" id="dots"></div>
  </div>

  <div class="contacto">
    <a class="btn-whatsapp" href="https://wa.me/TU_NUMERO_AQUI?text=Hola%2C%20me%20interesa%20esta%20propiedad" target="_blank">
      Consultar por WhatsApp
    </a>
  </div>
</div>

<script>
  const slides = document.querySelectorAll('.slide');
  const counter = document.getElementById('counter');
  const dotsContainer = document.getElementById('dots');
  let current = 0;

  slides.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.classList.add('dot');
    if (i === 0) dot.classList.add('active');
    dot.onclick = () => goToSlide(i);
    dotsContainer.appendChild(dot);
  });
  const dots = document.querySelectorAll('.dot');

  function update() {
    slides.forEach((s, i) => s.classList.toggle('active', i === current));
    dots.forEach((d, i) => d.classList.toggle('active', i === current));
    counter.textContent = (current + 1) + ' / ' + slides.length;
  }

  function changeSlide(dir) {
    current = (current + dir + slides.length) % slides.length;
    update();
  }
  function goToSlide(i) {
    current = i;
    update();
  }

  setInterval(() => { changeSlide(1); }, 5000);
</script>

</body>
</html>
